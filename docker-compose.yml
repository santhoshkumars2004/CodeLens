# StackSense — Docker Compose (Development)
# Run: docker-compose up -d

version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stacksense-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama3-8b-8192}
      - CHROMA_PERSIST_DIR=/app/data/chromadb
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - chromadb_data:/app/data/chromadb
      - repos_data:/tmp/stacksense_repos
    networks:
      - stacksense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stacksense-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - stacksense-network
    restart: unless-stopped

  # ── Prometheus Monitoring ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stacksense-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - stacksense-network
    restart: unless-stopped

  # ── Grafana Dashboard ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stacksense-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=stacksense
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - stacksense-network
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────
volumes:
  chromadb_data:
  repos_data:
  prometheus_data:
  grafana_data:

# ── Network ───────────────────────────────────────────────────────
networks:
  stacksense-network:
    driver: bridge
