# CodeLens — Docker Compose
#
# This file defines ALL services needed to run CodeLens.
# ONE command to rule them all: docker-compose up --build
#
# HOW DOCKER COMPOSE NETWORKING WORKS:
#   - Every service gets a hostname = its service name
#   - "backend" container can reach "chromadb" container at http://chromadb:8001
#   - From your HOST machine, access via localhost:PORT
#
# HOW VOLUMES WORK:
#   - Containers are ephemeral (data dies when container dies)
#   - Named volumes persist data outside containers
#   - chromadb_data persists your vector DB even if you restart containers

services:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # FastAPI Backend
  # Runs the RAG pipeline: ingestion, retrieval, reranking, generation
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend:
    build:
      context: ./backend       # Build from backend/Dockerfile
      dockerfile: Dockerfile
    container_name: codelens-backend
    ports:
      - "8000:8000"            # HOST:CONTAINER — access via localhost:8000

    environment:
      # Secrets — loaded from .env file in project root (never commit .env!)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama3-8b-8192}

      # ChromaDB is accessed via service name (not localhost!) inside Docker
      # Because containers talk to each other through the Docker network
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8001
      - CHROMA_PERSIST_DIR=/app/data/chromadb

      # Embedding + Reranker (local HuggingFace models — no API key needed)
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-base-en-v1.5}
      - RERANKER_MODEL=${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-12-v2}

      # CORS — allow the frontend container to call the backend
      - FRONTEND_URL=http://localhost:3000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Named volume: ChromaDB data persists even if backend container is deleted
      - chromadb_data:/app/data/chromadb
      # Named volume: cloned GitHub repos cached here
      - repos_data:/tmp/codelens_repos
      # HuggingFace model cache — download once, reuse forever
      - hf_cache:/root/.cache/huggingface

    networks:
      - codelens-network

    depends_on:
      - chromadb

    restart: unless-stopped         # Auto-restart if it crashes (not on manual stop)

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s             # Give it time to download HuggingFace models
      retries: 3

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Next.js Frontend
  # Production build served on port 3000
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codelens-frontend
    ports:
      - "3000:3000"

    environment:
      # This URL is used by the Next.js server at runtime (not build time)
      # Inside Docker, "backend" is the hostname of the backend service
      - NEXT_PUBLIC_API_URL=http://backend:8000

    depends_on:
      backend:
        condition: service_healthy  # Don't start until backend is healthy

    networks:
      - codelens-network

    restart: unless-stopped

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # ChromaDB — Vector Database
  # Pre-built official image (no Dockerfile needed!)
  # Stores code chunk embeddings for semantic search
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  chromadb:
    image: chromadb/chroma:latest   # Official image from Docker Hub
    container_name: codelens-chromadb
    ports:
      - "8001:8000"                 # ChromaDB runs on 8000 internally, mapped to 8001

    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

    volumes:
      # CRITICAL: Without this volume, ALL your indexed vectors are lost on restart
      - chromadb_data:/chroma/chroma

    networks:
      - codelens-network

    restart: unless-stopped

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Named Volumes
# Managed by Docker — data survives container restarts/deletions
# View them: docker volume ls
# Delete them: docker volume rm codelens_chromadb_data
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
volumes:
  chromadb_data:    # Vector DB data
  repos_data:       # Cloned GitHub repos (temp cache)
  hf_cache:         # HuggingFace model weights (avoid re-downloading)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Network
# All services join this bridge network and can reach each other by name
# "codelens-backend" → http://backend:8000
# "codelens-frontend" → http://frontend:3000
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
networks:
  codelens-network:
    driver: bridge
