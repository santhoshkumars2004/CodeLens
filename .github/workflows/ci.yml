# StackSense — CI Pipeline (GitHub Actions)
#
# WHAT IS CI (Continuous Integration)?
#   Every time someone pushes code or opens a Pull Request, this file
#   automatically runs on GitHub's servers to:
#     1. Check code quality (linting)
#     2. Run tests
#     3. Build Docker images
#
#   If ANY step fails → GitHub blocks the merge. This prevents bad code
#   from reaching production.
#
# TRIGGER: Runs on every push to main or any Pull Request

name: CI — Test & Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Test the FastAPI backend
  # Runs on a fresh Ubuntu machine on GitHub's cloud servers
  # ─────────────────────────────────────────────────────────────────
  backend-test:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest           # Fresh Ubuntu VM for every run

    steps:
      # Step 1: Download the repo code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"               # Cache pip packages between runs (faster)

      # Step 3: Install all Python dependencies
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # Step 4: Lint — check code style
      # Ruff is an extremely fast Python linter (catches bugs + bad style)
      - name: Lint with Ruff
        run: |
          cd backend
          pip install ruff
          ruff check .

      # Step 5: Run tests (if tests folder exists)
      - name: Run backend tests
        run: |
          cd backend
          if [ -d "tests" ]; then python -m pytest tests/ -v; else echo "No tests yet — skipping"; fi
        env:
          # Secrets are stored in GitHub → Settings → Secrets
          # They are NEVER visible in logs
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Build the Next.js frontend
  # Runs PARALLEL to backend-test (both jobs start at the same time)
  # ─────────────────────────────────────────────────────────────────
  frontend-build:
    name: 📦 Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build production bundle
        run: cd frontend && npm run build

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Build & Push Docker images to Docker Hub
  # Only runs AFTER both jobs above succeed
  # Only runs on pushes to main (not PRs — PRs just test, don't deploy)
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]  # Wait for both to pass first

    # Only push images on main branch — not on PRs
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub (credentials stored as GitHub Secrets)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Set up Docker Buildx (enables caching + multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push backend image
      # Tags: latest + the specific commit SHA (for rollback capability)
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stacksense-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stacksense-backend:${{ github.sha }}
          cache-from: type=gha    # Use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stacksense-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stacksense-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
