apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chromadb
  namespace: stacksense
spec:
  serviceName: chromadb
  replicas: 1
  selector:
    matchLabels:
      app: stacksense
      component: chromadb
  template:
    metadata:
      labels:
        app: stacksense
        component: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: chromadb-data
              mountPath: /chroma/chroma
  volumeClaimTemplates:
    - metadata:
        name: chromadb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
