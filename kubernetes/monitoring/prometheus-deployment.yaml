apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: codelens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codelens
      component: prometheus
  template:
    metadata:
      labels:
        app: codelens
        component: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: codelens
spec:
  selector:
    app: codelens
    component: prometheus
  ports:
    - port: 9090
      targetPort: 9090
