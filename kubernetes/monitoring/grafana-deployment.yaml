apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: codelens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codelens
      component: grafana
  template:
    metadata:
      labels:
        app: codelens
        component: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: codelens
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: codelens
spec:
  selector:
    app: codelens
    component: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: LoadBalancer
