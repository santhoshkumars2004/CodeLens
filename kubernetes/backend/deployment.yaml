apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: codelens
  labels:
    app: codelens
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codelens
      component: backend
  template:
    metadata:
      labels:
        app: codelens
        component: backend
    spec:
      containers:
        - name: backend
          image: codelens/backend:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
