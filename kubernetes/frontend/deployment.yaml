apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: stacksense
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stacksense
      component: frontend
  template:
    metadata:
      labels:
        app: stacksense
        component: frontend
    spec:
      containers:
        - name: frontend
          image: stacksense/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend:8000"
